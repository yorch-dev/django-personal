{% extends 'base.html' %}
{% load static %}

{% block title %}
  Cambiar contraseña
{% endblock title %}

{% block body %}
{% load crispy_forms_tags %}

<div class="container">
  <div class="row">
    <div class="col-12 col-md-8 mx-auto">
      <div class="card p-3 mx-auto">
          <h2 class="text-center">Cambiar contraseña</h2>
          <form method="post">
            {% csrf_token %}
            {{ form | crispy }}
            <button type="submit" class="btn btn-secondary">Ingresar</button>
          </form>
          <p class="mt-3 mx-auto">
            Volver al <a href="{% url 'index' %}">inicio <i class="bi bi-house-fill"></i> </a>
          </p>
      </div>      
    </div>
  </div>
</div>
  
{% endblock body %}
